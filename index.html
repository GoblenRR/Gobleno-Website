<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gobleno</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="styles.css?v=20260409-16">
  <!-- Cloudflare Web Analytics -->
  <script
    defer
    src="https://static.cloudflareinsights.com/beacon.min.js"
    data-cf-beacon='{"token":"49d5712aa2464770892adfdadf1d8731"}'
  ></script>
  <!-- End Cloudflare Web Analytics -->
  <script src="script.js?v=20260409-16" defer></script>
</head>
<body class="page-shell">
  <div class="bg-shape bg-shape-one"></div>
  <div class="bg-shape bg-shape-two"></div>
  <div class="bg-shape bg-shape-three"></div>
  <div class="bg-glow"></div>
  <div class="watch-open-overlay" aria-hidden="true">
    <div class="watch-open-door watch-open-door--left"></div>
    <div class="watch-open-door watch-open-door--right"></div>
    <div class="watch-open-core"></div>
  </div>

  <main class="layout dashboard-layout" data-route-app>
    <section class="app-shell">
      <header class="app-topbar">
        <div class="app-topbar__title">
          <a class="back-mark" href="#home" data-route-link="home" aria-label="Go to home">
            <span></span>
            <span></span>
          </a>
          <h1 class="app-title">Gobleno</h1>
        </div>
      </header>

      <nav class="app-tabs" aria-label="Primary navigation">
        <a class="app-tab" href="#home" data-route-link="home" data-tab-for="home">Home</a>
        <a class="app-tab" href="#links" data-route-link="links" data-tab-for="links">Links</a>
        <a class="app-tab" href="#ui" data-route-link="ui" data-tab-for="ui">UI Design</a>
        <a class="app-tab" href="#contact" data-route-link="contact" data-tab-for="contact">Contact</a>
        <a class="app-tab" href="#placeholder" data-route-link="placeholder" data-tab-for="placeholder">Coming Soon</a>
      </nav>

      <section class="app-stage">
        <section
          class="route-panel route-screen home-screen"
          data-discord-card
          data-route-panel="home"
          aria-hidden="false"
        >
          <div class="home-grid">
            <aside class="discord-spotlight">
              <div class="profile-card" data-depth-card>
                <div class="profile-card__shine"></div>
                <div class="discord-profile">
                  <div class="discord-avatar-shell">
                    <img
                      class="discord-avatar"
                      data-discord-avatar
                      src="https://cdn.discordapp.com/embed/avatars/1.png"
                      alt="Gobleno Discord avatar"
                    >
                    <span
                      class="discord-status-badge status-offline"
                      data-discord-status-badge
                      aria-label="Offline"
                      title="Offline"
                    ></span>
                  </div>

                  <h2 class="discord-display-name" data-discord-name>Gobleno</h2>
                </div>
              </div>

              <div class="presence-stack" data-discord-presence hidden></div>

              <div class="home-actions">
                <a class="action-button action-button--solid" href="#contact" data-route-link="contact">Contact Me</a>
              </div>
            </aside>
          </div>

          <div class="stats-strip">
            <article class="stat-card stat-card--full" aria-label="Views">
              <span class="stat-card__icon" aria-hidden="true">
                <svg viewBox="0 0 64 64" role="img">
                  <circle cx="22" cy="18" r="10"></circle>
                  <path d="M10 42c0-8 5.8-14 13-14s13 6 13 14v6H10Z"></path>
                  <circle cx="44" cy="24" r="8"></circle>
                  <path d="M34 44c0-6.4 4.8-11 10-11 5.6 0 10 4.6 10 11v4H34Z"></path>
                </svg>
              </span>
              <span class="stat-card__text">
                <span class="stat-card__value" data-count-up data-count-duration="1400">0</span>
                <span class="stat-card__label">Page Views</span>
              </span>
            </article>
          </div>
        </section>

        <section
          class="route-panel route-screen links-screen"
          data-route-panel="links"
          aria-hidden="true"
          hidden
        >
          <div class="panel-heading">
            <h2 class="panel-title">Links</h2>
            <p class="panel-subtitle">All the links that I have</p>
          </div>

          <div class="links-board">
            <a class="social-card social-card--youtube" href="https://www.youtube.com/@GoblenoRR" target="_blank" rel="noreferrer" data-depth-card>
              <span class="social-card__tile">
                <span class="social-card__icon">
                  <img src="https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg" alt="">
                </span>
              </span>
              <span class="social-card__title">YouTube</span>
            </a>

            <a class="social-card social-card--discord" href="https://discord.com/invite/WYwjKddwmK" target="_blank" rel="noreferrer" data-depth-card>
              <span class="social-card__tile">
                <span class="social-card__icon">
                  <img src="https://cdn.prod.website-files.com/6257adef93867e50d84d30e2/66e3d7f4ef6498ac018f2c55_Symbol.svg" alt="">
                </span>
              </span>
              <span class="social-card__title">Discord</span>
            </a>
          </div>
        </section>

        <section
          class="route-panel route-screen ui-screen"
          data-route-panel="ui"
          aria-hidden="true"
          hidden
        >
          <div class="panel-heading">
            <h2 class="panel-title">UI Design</h2>
          </div>

          <div class="showcase-board">
            <article class="showcase-block showcase-block--large"></article>
            <article class="showcase-block showcase-block--small"></article>
            <article class="showcase-block showcase-block--accent"></article>
          </div>
        </section>

        <section
          class="route-panel route-screen contact-screen"
          data-route-panel="contact"
          aria-hidden="true"
          hidden
        >
          <div class="panel-heading">
            <h2 class="panel-title">Contact</h2>
          </div>
        </section>

        <section
          class="route-panel route-screen placeholder-screen"
          data-route-panel="placeholder"
          aria-hidden="true"
          hidden
        >
          <div class="panel-heading">
            <h2 class="panel-title">Coming Soon</h2>
          </div>

          <div class="placeholder-board placeholder-board--centered">
            <div class="discord-illustration discord-illustration--large" aria-hidden="true">
              <span class="cloud-strip cloud-strip--one"></span>
              <span class="cloud-strip cloud-strip--two"></span>
              <span class="cloud-strip cloud-strip--three"></span>
              <span class="cloud-strip cloud-strip--four"></span>
              <span class="search-badge">
                <span class="search-badge__inner">?</span>
              </span>
            </div>
          </div>
        </section>
      </section>
    </section>
  </main>
</body>
</html>
